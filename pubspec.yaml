name: motivo
description: Motivo — Every Step Has Value. Walk-to-earn fitness rewards app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2

  # Step counting & health
  pedometer: ^4.0.1
  health: ^10.1.0
  permission_handler: ^11.3.1

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Networking
  dio: ^5.4.3
  retrofit: ^4.1.0

  # UI helpers
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  percent_indicator: ^4.2.3
  confetti: ^0.7.0
  haptic_feedback: ^0.1.0+2
  intl: ^0.19.0

  # Icons
  lucide_icons: ^0.0.11
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-Black.ttf
          weight: 900
